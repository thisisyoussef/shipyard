name: Deploy Shipyard to Railway

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: shipyard-railway-production
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  deploy:
    name: Deploy hosted Shipyard
    runs-on: ubuntu-latest
    env:
      RAILWAY_PROJECT_ID: c7288cb4-d64f-497f-863d-f3914b76f48f
      RAILWAY_ENVIRONMENT_ID: 0753d01d-fb6c-4f37-8753-412fb855dc0a
      RAILWAY_SERVICE_ID: cb3f46eb-8591-467e-88ce-87672a24c666
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SHIPYARD_GITHUB_TOKEN: ${{ secrets.SHIPYARD_GITHUB_TOKEN }}
      SHIPYARD_ACCESS_TOKEN: ${{ secrets.SHIPYARD_ACCESS_TOKEN }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare GHCR image reference
        id: ghcr
        run: |
          image_repo="ghcr.io/${GITHUB_REPOSITORY,,}"
          image_ref="${image_repo}:sha-${GITHUB_SHA}"
          echo "image_repo=${image_repo}" >> "${GITHUB_OUTPUT}"
          echo "image_ref=${image_ref}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push hosted Shipyard image
        uses: docker/build-push-action@v6
        with:
          context: ./shipyard
          file: ./shipyard/Dockerfile
          push: true
          platforms: linux/amd64
          provenance: false
          sbom: false
          tags: |
            ${{ steps.ghcr.outputs.image_ref }}
            ${{ steps.ghcr.outputs.image_repo }}:main
          labels: |
            org.opencontainers.image.description=Hosted Shipyard Railway runtime
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.20.2"

      - name: Install Railway CLI
        run: npm install --global @railway/cli@4.33.0

      - name: Verify Railway credentials
        run: |
          if [ -z "${RAILWAY_TOKEN}" ] && [ -z "${RAILWAY_API_TOKEN}" ]; then
            echo "Missing Railway deploy token. Set RAILWAY_TOKEN or RAILWAY_API_TOKEN in GitHub secrets." >&2
            exit 1
          fi

      - name: Select Railway control token
        run: |
          if [ -n "${RAILWAY_API_TOKEN}" ]; then
            echo "RAILWAY_CONTROL_TOKEN=${RAILWAY_API_TOKEN}" >> "${GITHUB_ENV}"
          else
            echo "RAILWAY_CONTROL_TOKEN=${RAILWAY_TOKEN}" >> "${GITHUB_ENV}"
          fi

      - name: Verify production credentials
        run: |
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "Missing OPENAI_API_KEY GitHub secret. Set it before deploying production." >&2
            exit 1
          fi
          if [ -z "${SHIPYARD_ACCESS_TOKEN}" ]; then
            echo "Missing SHIPYARD_ACCESS_TOKEN GitHub secret. Set it before deploying production." >&2
            exit 1
          fi

      - name: Link Railway production project
        env:
          RAILWAY_TOKEN: ${{ env.RAILWAY_CONTROL_TOKEN }}
        run: |
          railway project link \
            --project "${RAILWAY_PROJECT_ID}" \
            --environment "${RAILWAY_ENVIRONMENT_ID}" \
            --service "${RAILWAY_SERVICE_ID}"

      - name: Sync Railway production variables
        working-directory: shipyard
        env:
          RAILWAY_TOKEN: ${{ env.RAILWAY_CONTROL_TOKEN }}
        run: |
          printf '%s' "${OPENAI_API_KEY}" | railway variable set OPENAI_API_KEY --stdin \
            --skip-deploys \
            --environment "${RAILWAY_ENVIRONMENT_ID}" \
            --service "${RAILWAY_SERVICE_ID}"
          if [ -n "${SHIPYARD_GITHUB_TOKEN}" ]; then
            printf '%s' "${SHIPYARD_GITHUB_TOKEN}" | railway variable set GITHUB_TOKEN --stdin \
              --skip-deploys \
              --environment "${RAILWAY_ENVIRONMENT_ID}" \
              --service "${RAILWAY_SERVICE_ID}"
          fi
          if [ -n "${VERCEL_TOKEN}" ]; then
            printf '%s' "${VERCEL_TOKEN}" | railway variable set VERCEL_TOKEN --stdin \
              --skip-deploys \
              --environment "${RAILWAY_ENVIRONMENT_ID}" \
              --service "${RAILWAY_SERVICE_ID}"
          fi
          printf '%s' "${SHIPYARD_ACCESS_TOKEN}" | railway variable set SHIPYARD_ACCESS_TOKEN --stdin \
            --skip-deploys \
            --environment "${RAILWAY_ENVIRONMENT_ID}" \
            --service "${RAILWAY_SERVICE_ID}"
          railway variable set \
            PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 \
            SHIPYARD_TARGETS_DIR=/app/workspace \
            SHIPYARD_UI_HOST=0.0.0.0 \
            SHIPYARD_REQUIRE_PERSISTENT_WORKSPACE=1 \
            SHIPYARD_MODEL_PROVIDER=openai \
            SHIPYARD_OPENAI_MODEL=gpt-5.4 \
            --skip-deploys \
            --environment "${RAILWAY_ENVIRONMENT_ID}" \
            --service "${RAILWAY_SERVICE_ID}"

      - name: Deploy hosted image to Railway
        env:
          RAILWAY_TOKEN: ${{ env.RAILWAY_CONTROL_TOKEN }}
          RAILWAY_IMAGE_REF: ${{ steps.ghcr.outputs.image_ref }}
        run: |
          bash .github/scripts/railway-ci-deploy.sh
